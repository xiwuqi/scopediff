name: Bug report
description: Report a ScopeDiff bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the command, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal fixture
      description: Please remove secrets and private data.
    validations:
      required: false
