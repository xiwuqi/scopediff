<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ScopeDiff social preview">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#hero)"/>
  <rect x="72" y="70" width="1056" height="490" rx="28" fill="#020617" opacity="0.78"/>
  <text x="110" y="160" fill="#f8fafc" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="74" font-weight="800">ScopeDiff</text>
  <text x="112" y="218" fill="#bfdbfe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="30">Review AI agent permissions before merge</text>
  <rect x="112" y="270" width="510" height="206" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="144" y="320" fill="#93c5fd" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="25">ScopeDiff Report</text>
  <text x="144" y="366" fill="#fca5a5" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="23">Risk: High</text>
  <text x="144" y="410" fill="#dbeafe" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="22">+ MCP server: github</text>
  <text x="144" y="448" fill="#dbeafe" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="22">+ Env: GITHUB_TOKEN</text>
  <text x="680" y="320" fill="#f8fafc" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Local-first CLI</text>
  <text x="680" y="372" fill="#dbeafe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="27">No telemetry · No code upload</text>
  <text x="680" y="424" fill="#dbeafe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="27">Markdown + JSON reports</text>
  <text x="680" y="476" fill="#dbeafe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="27">GitHub Actions ready</text>
</svg>
