<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-label="ScopeDiff explain">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#182235"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="24" fill="#e2e8f0"/>
  <rect x="26" y="24" width="1228" height="382" rx="18" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="26" y="24" width="1228" height="58" rx="18" fill="#0f172a"/>
  <circle cx="60" cy="53" r="8" fill="#fb7185"/>
  <circle cx="88" cy="53" r="8" fill="#fbbf24"/>
  <circle cx="116" cy="53" r="8" fill="#34d399"/>
  <text x="640" y="58" text-anchor="middle" fill="#94a3b8" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="15">ScopeDiff explain</text>
  <g font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="18">
<text x="34" y="88" fill="#9ae6b4">$ npx scopediff@latest explain R012</text>
<text x="34" y="112" fill="#dbeafe"></text>
<text x="34" y="136" fill="#93c5fd"># R012: GitHub Actions permissions expanded</text>
<text x="34" y="160" fill="#dbeafe"></text>
<text x="34" y="184" fill="#dbeafe">Default severity: high</text>
<text x="34" y="208" fill="#dbeafe"></text>
<text x="34" y="232" fill="#dbeafe">Why it matters:</text>
<text x="34" y="256" fill="#dbeafe"></text>
<text x="34" y="280" fill="#dbeafe">Workflow tokens may gain write access.</text>
<text x="34" y="304" fill="#dbeafe"></text>
<text x="34" y="328" fill="#dbeafe">Suggested review:</text>
<text x="34" y="352" fill="#dbeafe"></text>
<text x="34" y="376" fill="#dbeafe">Prefer job-level permissions and least privilege.</text>
  </g>
</svg>
