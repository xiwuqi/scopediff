<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ScopeDiff quick start commands">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="64" y="64" width="1072" height="502" rx="28" fill="#f8fafc"/>
  <text x="120" y="145" fill="#0f172a" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="58" font-weight="800">30-second quick start</text>
  <text x="122" y="190" fill="#475569" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="25">No setup service. No code upload. Run it where you review.</text>
  <text x="120" y="250" fill="#2563eb" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Install-free scan</text>
  <rect x="390" y="212" width="660" height="54" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="420" y="246" fill="#9ae6b4" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="22">npx scopediff@latest scan</text>
  <text x="120" y="338" fill="#2563eb" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Compare a branch</text>
  <rect x="390" y="300" width="660" height="54" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="420" y="334" fill="#9ae6b4" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="22">npx scopediff@latest diff --base main</text>
  <text x="120" y="426" fill="#2563eb" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="24" font-weight="700">CI threshold</text>
  <rect x="390" y="388" width="660" height="54" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="420" y="422" fill="#9ae6b4" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="22">npx scopediff@latest ci --fail-on high</text>
</svg>
