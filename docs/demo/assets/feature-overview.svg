<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ScopeDiff feature overview">
  <rect width="1200" height="630" fill="#e2e8f0"/>
  <rect x="54" y="54" width="1092" height="522" rx="30" fill="#020617"/>
  <text x="90" y="135" fill="#f8fafc" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="56" font-weight="800">What ScopeDiff checks</text>
  <text x="92" y="181" fill="#bfdbfe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="25">Review agent/tooling capability changes before merge</text>
  <rect x="90" y="220" width="485" height="124" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="120" y="268" fill="#bfdbfe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="27" font-weight="700">MCP changes</text>
  <text x="120" y="306" fill="#e2e8f0" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="19">New servers, commands, args, and env keys.</text>
  <rect x="625" y="220" width="485" height="124" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="655" y="268" fill="#bfdbfe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Workflow permissions</text>
  <text x="655" y="306" fill="#e2e8f0" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="19">Expanded permissions and sensitive triggers.</text>
  <rect x="90" y="390" width="485" height="124" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="120" y="438" fill="#bfdbfe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Review evidence</text>
  <text x="120" y="476" fill="#e2e8f0" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="19">File, line, severity, confidence, and suggestions.</text>
  <rect x="625" y="390" width="485" height="124" rx="18" fill="#0f172a" stroke="#334155"/>
  <text x="655" y="438" fill="#bfdbfe" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Local-first</text>
  <text x="655" y="476" fill="#e2e8f0" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="19">No telemetry, upload, or command execution.</text>
</svg>
