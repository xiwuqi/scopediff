<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ScopeDiff GitHub Step Summary layout mock">
  <rect width="1200" height="630" fill="#f6f8fa"/>
  <rect x="76" y="60" width="1048" height="510" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="112" y="120" fill="#24292f" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="42" font-weight="800">GitHub Step Summary</text>
  <text x="112" y="160" fill="#57606a" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="20">Layout mock based on ScopeDiff Markdown output</text>
  <line x1="112" y1="190" x2="1088" y2="190" stroke="#d8dee4"/>
  <text x="112" y="240" fill="#0969da" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="32" font-weight="700">ScopeDiff Report</text>
  <rect x="112" y="272" width="170" height="42" rx="21" fill="#ffebe9" stroke="#ff8182"/>
  <text x="145" y="301" fill="#cf222e" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Risk: High</text>
  <text x="112" y="356" fill="#24292f" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="24">New agent capability detected</text>
  <text x="140" y="406" fill="#57606a" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="20">• MCP server added: github</text>
  <text x="140" y="446" fill="#57606a" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="20">• Env required: GITHUB_TOKEN</text>
  <text x="140" y="486" fill="#57606a" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="20">• Workflow permissions expanded</text>
  <text x="112" y="540" fill="#57606a" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" font-size="18">Default behavior: write summary only. No PR comment unless explicitly enabled in a future version.</text>
</svg>
